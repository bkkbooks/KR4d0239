body:
  text: 倪石陵書别集類三宋提要臣等謹案倪石陵書一巻宋倪朴撰朴字文卿浦江人居於石陵村因以為號嘗應進士舉紹興未為書萬言擬上髙宗而不果鄭伯熊陳亮皆極賞之後為里人所搆徙置筠州以赦得還呉師道宋濂皆為作傳師道稱其䆒悉用兵攻守險要尤精地理著輿地㑹元志四十卷今不傳傳者僅此集蓋十不存一矣首擬上髙宗書又書劄八篇書唐史諸傳七則辯一篇大抵皆古健有法惟其觀音院鐘刻辯論呉越所以改元者乃因梁滅于唐不肯反面事仇奉正朔于唐為錢氏立國之大節夫錢鏐固唐遺民也當朱温僭逆之時羅隱之言凛然大義乃不以篡唐之梁為仇而反以滅梁之唐為仇是非顛倒莫甚于是朴因汴京喪亂務伸復讎之義遂併此事而附㑹之可謂斯言之玷而鄭楷杜桓二跋乃特稱是篇其言亦甚矣巻未又有呉萊一序乃為謝翺輯朴雜著而作者獨不舉此篇其識固在二人上也翺所輯久無傳本其序葢自淵穎集錄出者此本則明嘉靖丙戌麻城毛鳯韶所輯其不曰集而曰書者鳯韶自序謂以上髙宗書為主舉所重云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:67b83aee76ab32c74a8219bd997456ad6aa1a0945f358f86edcb18afaa2cbdb7
